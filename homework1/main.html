<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السيرة الذاتية - محمد غازي</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .cv-container {
            max-width: 800px;
            margin: 50px auto;
        }

        .header {
            background-color: #0d6efd;
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }

        .section {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }

        h2 {
            color: #0d6efd;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container cv-container">

    <div class="header">
        <h1>محمد غازي</h1>
        <p class="mb-0">مبرمج</p>
    </div>

    <div class="section">
        <h2>نبذة عني</h2>
        <p>
            مبرمج مهتم بتطوير المواقع والتطبيقات، أسعى إلى تطوير مهاراتي
            التقنية باستمرار وإنشاء مشاريع عملية باستخدام أحدث تقنيات البرمجة.
        </p>
    </div>

    <div class="section">
        <h2>التعليم</h2>
        <p>
            طالب في تخصص البرمجة وتقنية المعلومات.
        </p>
    </div>

    <div class="section">
        <h2>المهارات</h2>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>Bootstrap</li>
            <li>JavaScript</li>
            <li>حل المشكلات البرمجية</li>
        </ul>
    </div>

</div>

</body>
</html>
